name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit + integration tests
        run: pnpm test

      - name: Evals (gate on baseline regression)
        run: pnpm evals

      - name: Build
        run: pnpm build
        env:
          # Placeholder keys — the build performs no network calls. Data pages
          # are dynamic, so no DB/Upstash/Anthropic access happens at build time.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_ci_placeholder
